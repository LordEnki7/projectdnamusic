version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL}

      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY}

      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Local file storage path (inside container)
      LOCAL_STORAGE_PATH: /app/uploads

    volumes:
      - uploads_data:/app/uploads

  # Optional: self-hosted PostgreSQL
  # Uncomment if you want to run the database on the same server.
  # Otherwise, point DATABASE_URL at your external Neon / Hostinger DB.
  #
  # db:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: projectdna
  #     POSTGRES_USER: projectdna
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  uploads_data:
  # postgres_data:
